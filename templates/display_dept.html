<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <h1>Department Table</h1>
        <table border="3px">
            <tr>
                <th>Department Number</th>
                <th>Dept Name</th>
                <th>Location</th>
            </tr>

            {% for DO in QSLDO %}
                <tr>
                    <td>{{DO.deptNo}}</td>
                    <td>{{DO.dName}}</td>
                    <td>{{DO.loc}}</td>
                </tr>
            {% endfor %}
        </table>
    </center>
</body>
</html>
